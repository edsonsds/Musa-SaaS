<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Musa SaaS — Super Admin</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:#0f0f1a;color:#e2e8f0;min-height:100vh}
.login-wrap{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:#1a1a2e;border:1px solid #2d2d4e;border-radius:16px;padding:40px;width:100%;max-width:400px;text-align:center}
.logo{font-size:2.5rem;margin-bottom:8px}
h1{font-size:1.4rem;color:#a78bfa;margin-bottom:4px}
.sub{color:#64748b;font-size:.9rem;margin-bottom:28px}
input{width:100%;padding:12px 16px;background:#0f0f1a;border:1px solid #2d2d4e;border-radius:8px;color:#e2e8f0;font-size:1rem;margin-bottom:12px}
input:focus{outline:none;border-color:#a78bfa}
button.btn-login{width:100%;padding:12px;background:linear-gradient(135deg,#a78bfa,#ec4899);border:none;border-radius:8px;color:#fff;font-size:1rem;font-weight:600;cursor:pointer}
button.btn-login:hover{opacity:.9}
.erro{color:#f87171;font-size:.85rem;margin-top:8px}
/* Dashboard */
.dash{display:none;min-height:100vh}
.topbar{background:#1a1a2e;border-bottom:1px solid #2d2d4e;padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.topbar h2{color:#a78bfa;font-size:1.1rem}
.btn-sair{background:none;border:1px solid #4b5563;padding:6px 14px;border-radius:6px;color:#94a3b8;cursor:pointer;font-size:.85rem}
.btn-sair:hover{background:#374151;color:#e2e8f0}
.content{padding:24px;max-width:1100px;margin:0 auto}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:16px;margin-bottom:28px}
.stat-card{background:#1a1a2e;border:1px solid #2d2d4e;border-radius:12px;padding:20px;text-align:center}
.stat-num{font-size:2rem;font-weight:700;color:#a78bfa}
.stat-label{font-size:.8rem;color:#64748b;margin-top:4px}
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.section-header h3{font-size:1.1rem;color:#e2e8f0}
.btn-novo{background:linear-gradient(135deg,#a78bfa,#ec4899);border:none;padding:8px 18px;border-radius:8px;color:#fff;font-weight:600;cursor:pointer;font-size:.9rem}
.btn-novo:hover{opacity:.9}
table{width:100%;border-collapse:collapse}
th{background:#0f0f1a;padding:10px 14px;text-align:left;font-size:.8rem;color:#64748b;text-transform:uppercase;letter-spacing:.05em}
td{padding:12px 14px;border-bottom:1px solid #1e1e3a;font-size:.9rem}
tr:hover td{background:#1e1e3a}
.badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600}
.badge.ativo{background:#064e3b;color:#6ee7b7}
.badge.inativo{background:#450a0a;color:#fca5a5}
.badge.trial{background:#1e3a5f;color:#93c5fd}
.badge.pago{background:#064e3b;color:#6ee7b7}
.btn-acao{background:none;border:1px solid #374151;padding:4px 10px;border-radius:6px;color:#94a3b8;cursor:pointer;font-size:.8rem;margin:0 2px}
.btn-acao:hover{background:#374151;color:#e2e8f0}
.btn-acao.danger{border-color:#7f1d1d;color:#f87171}
.btn-acao.danger:hover{background:#7f1d1d;color:#fff}
/* Modal */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:#1a1a2e;border:1px solid #2d2d4e;border-radius:16px;padding:32px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto}
.modal h3{color:#a78bfa;margin-bottom:20px;font-size:1.2rem}
.form-group{margin-bottom:14px}
.form-group label{display:block;font-size:.85rem;color:#94a3b8;margin-bottom:5px}
.form-group input,.form-group select{width:100%;padding:10px 14px;background:#0f0f1a;border:1px solid #2d2d4e;border-radius:8px;color:#e2e8f0;font-size:.95rem}
.form-group input:focus,.form-group select:focus{outline:none;border-color:#a78bfa}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px}
.btn-cancel{background:none;border:1px solid #374151;padding:8px 18px;border-radius:8px;color:#94a3b8;cursor:pointer}
.btn-save{background:linear-gradient(135deg,#a78bfa,#ec4899);border:none;padding:8px 20px;border-radius:8px;color:#fff;font-weight:600;cursor:pointer}
.msg{padding:10px 14px;border-radius:8px;margin-bottom:16px;font-size:.9rem;display:none}
.msg.ok{background:#064e3b;color:#6ee7b7;display:block}
.msg.err{background:#450a0a;color:#fca5a5;display:block}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="loginWrap">
  <div class="login-box">
    <div class="logo">💄</div>
    <h1>Musa SaaS</h1>
    <p class="sub">Painel Super Admin</p>
    <input type="text" id="saLogin" placeholder="Login" value="superadmin">
    <input type="password" id="saSenha" placeholder="Senha" value="">
    <button class="btn-login" onclick="fazerLogin()">Entrar</button>
    <div class="erro" id="loginErro"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dash" id="dash">
  <div class="topbar">
    <h2>💄 Musa SaaS — Super Admin</h2>
    <button class="btn-sair" onclick="sair()">Sair</button>
  </div>
  <div class="content">
    <div class="stats" id="stats"></div>
    <div class="section-header">
      <h3>Salões Cadastrados</h3>
      <button class="btn-novo" onclick="abrirModalNovo()">+ Novo Salão</button>
    </div>
    <div id="msgGlobal" class="msg"></div>
    <table>
      <thead>
        <tr>
          <th>#</th><th>Nome</th><th>Email</th><th>Plano</th>
          <th>Clientes</th><th>Agendamentos</th><th>Status</th><th>Ações</th>
        </tr>
      </thead>
      <tbody id="tbSaloes"></tbody>
    </table>
  </div>
</div>

<!-- MODAL NOVO/EDITAR SALÃO -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h3 id="modalTitulo">Novo Salão</h3>
    <div id="modalMsg" class="msg"></div>
    <div class="form-group"><label>Nome do Salão *</label><input type="text" id="fNome" placeholder="Ex: Studio Aurora"></div>
    <div class="form-group"><label>Email</label><input type="email" id="fEmail" placeholder="contato@salao.com"></div>
    <div class="form-group"><label>Telefone</label><input type="text" id="fTel" placeholder="(11) 99999-0000"></div>
    <div class="form-group"><label>Endereço</label><input type="text" id="fEnd" placeholder="Rua, bairro, cidade"></div>
    <div class="form-group"><label>Plano</label>
      <select id="fPlano"><option value="trial">Trial (grátis)</option><option value="basico">Básico</option><option value="pro">Pro</option></select>
    </div>
    <div class="form-group" id="grpAtivo" style="display:none">
      <label>Status</label>
      <select id="fAtivo"><option value="1">Ativo</option><option value="0">Inativo</option></select>
    </div>
    <div class="form-group" id="grpSenha" style="display:none">
      <label>Resetar Senha Admin (deixe em branco para não alterar)</label>
      <input type="text" id="fSenha" placeholder="Nova senha do admin do salão">
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
      <button class="btn-save" onclick="salvarSalao()">Salvar</button>
    </div>
  </div>
</div>

<script>
let _editId = null;

async function fazerLogin() {
  const login = document.getElementById('saLogin').value;
  const senha = document.getElementById('saSenha').value;
  const r = await fetch('/api/superadmin/login', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({login,senha})});
  const d = await r.json();
  if (d.ok) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('dash').style.display = 'block';
    carregarSaloes();
  } else {
    document.getElementById('loginErro').textContent = d.erro || 'Erro ao fazer login';
  }
}

async function sair() {
  await fetch('/api/superadmin/logout', {method:'POST'});
  location.reload();
}

async function carregarSaloes() {
  const r = await fetch('/api/superadmin/saloes');
  const saloes = await r.json();
  const tb = document.getElementById('tbSaloes');
  tb.innerHTML = '';
  let totAtivos = 0, totClientes = 0, totAgs = 0;
  for (const s of saloes) {
    if (s.ativo) totAtivos++;
    totClientes += s.total_clientes || 0;
    totAgs += s.total_ags || 0;
    tb.innerHTML += '<tr>' +
      '<td>' + s.id + '</td>' +
      '<td><strong>' + s.nome + '</strong></td>' +
      '<td>' + (s.email || '-') + '</td>' +
      '<td><span class="badge ' + s.plano + '">' + s.plano + '</span></td>' +
      '<td>' + (s.total_clientes || 0) + '</td>' +
      '<td>' + (s.total_ags || 0) + '</td>' +
      '<td><span class="badge ' + (s.ativo ? 'ativo' : 'inativo') + '">' + (s.ativo ? 'Ativo' : 'Inativo') + '</span></td>' +
      '<td>' +
        '<button class="btn-acao" onclick="editarSalao(' + s.id + ')">✏️ Editar</button>' +
        '<button class="btn-acao" onclick="loginComoSalao(' + s.id + ')">🔑 Login URL</button>' +
        '<button class="btn-acao danger" onclick="desativarSalao(' + s.id + ')">🗑️</button>' +
      '</td>' +
    '</tr>';
  }
  document.getElementById('stats').innerHTML =
    '<div class="stat-card"><div class="stat-num">' + saloes.length + '</div><div class="stat-label">Total de Salões</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + totAtivos + '</div><div class="stat-label">Salões Ativos</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + totClientes + '</div><div class="stat-label">Total de Clientes</div></div>' +
    '<div class="stat-card"><div class="stat-num">' + totAgs + '</div><div class="stat-label">Total de Agendamentos</div></div>';
}

function abrirModalNovo() {
  _editId = null;
  document.getElementById('modalTitulo').textContent = 'Novo Salão';
  document.getElementById('fNome').value = '';
  document.getElementById('fEmail').value = '';
  document.getElementById('fTel').value = '';
  document.getElementById('fEnd').value = '';
  document.getElementById('fPlano').value = 'trial';
  document.getElementById('grpAtivo').style.display = 'none';
  document.getElementById('grpSenha').style.display = 'none';
  document.getElementById('modalMsg').className = 'msg';
  document.getElementById('modalBg').classList.add('open');
}

async function editarSalao(id) {
  _editId = id;
  const r = await fetch('/api/superadmin/saloes/' + id);
  const s = await r.json();
  document.getElementById('modalTitulo').textContent = 'Editar Salão';
  document.getElementById('fNome').value = s.nome || '';
  document.getElementById('fEmail').value = s.email || '';
  document.getElementById('fTel').value = s.telefone || '';
  document.getElementById('fEnd').value = s.endereco || '';
  document.getElementById('fPlano').value = s.plano || 'trial';
  document.getElementById('fAtivo').value = s.ativo ? '1' : '0';
  document.getElementById('fSenha').value = '';
  document.getElementById('grpAtivo').style.display = 'block';
  document.getElementById('grpSenha').style.display = 'block';
  document.getElementById('modalMsg').className = 'msg';
  document.getElementById('modalBg').classList.add('open');
}

function fecharModal() {
  document.getElementById('modalBg').classList.remove('open');
}

async function salvarSalao() {
  const nome = document.getElementById('fNome').value.trim();
  if (!nome) { mostrarMsgModal('Nome é obrigatório', 'err'); return; }
  const body = {
    nome, email: document.getElementById('fEmail').value,
    telefone: document.getElementById('fTel').value,
    endereco: document.getElementById('fEnd').value,
    plano: document.getElementById('fPlano').value,
    ativo: parseInt(document.getElementById(_editId ? 'fAtivo' : 'fAtivo').value || '1')
  };
  let url = '/api/superadmin/saloes';
  let method = 'POST';
  if (_editId) { url += '/' + _editId; method = 'PUT'; }
  const r = await fetch(url, {method, headers:{'Content-Type':'application/json'}, body:JSON.stringify(body)});
  const d = await r.json();
  if (!d.ok) { mostrarMsgModal(d.erro || 'Erro ao salvar', 'err'); return; }
  const senha = document.getElementById('fSenha') ? document.getElementById('fSenha').value : '';
  if (_editId && senha) {
    await fetch('/api/superadmin/saloes/' + _editId + '/resetar-senha', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({senha})});
  }
  fecharModal();
  mostrarMsg('Salão salvo com sucesso!', 'ok');
  carregarSaloes();
}

async function desativarSalao(id) {
  if (!confirm('Desativar este salão?')) return;
  await fetch('/api/superadmin/saloes/' + id, {method:'DELETE'});
  mostrarMsg('Salão desativado.', 'ok');
  carregarSaloes();
}

function loginComoSalao(id) {
  const url = location.origin + '/?salon_id=' + id;
  prompt('URL de acesso para o salão (copie e envie ao cliente):', url);
}

function mostrarMsg(txt, tipo) {
  const el = document.getElementById('msgGlobal');
  el.textContent = txt;
  el.className = 'msg ' + tipo;
  setTimeout(() => el.className = 'msg', 4000);
}

function mostrarMsgModal(txt, tipo) {
  const el = document.getElementById('modalMsg');
  el.textContent = txt;
  el.className = 'msg ' + tipo;
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') { if (document.getElementById('loginWrap').style.display !== 'none') fazerLogin(); } });

// Verifica sessão ao carregar
(async () => {
  const r = await fetch('/api/superadmin/session');
  const d = await r.json();
  if (d.logado) {
    document.getElementById('loginWrap').style.display = 'none';
    document.getElementById('dash').style.display = 'block';
    carregarSaloes();
  }
})();
</script>
</body>
</html>
