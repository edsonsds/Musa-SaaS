<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Musa — Entrar</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --p: #7c3aed; --p2: #ec4899;
  --ink: #0a0a0a; --ink2: #525252; --ink3: #a3a3a3;
  --bg: #fafafa; --card: #ffffff; --border: rgba(0,0,0,.08);
  --grad: linear-gradient(135deg,#7c3aed,#ec4899);
}
html, body { height: 100%; }
body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg); color: var(--ink);
  display: flex; align-items: center; justify-content: center;
  min-height: 100vh; padding: 24px;
  -webkit-font-smoothing: antialiased;
}

/* AURORA */
.aurora { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
.blob {
  position: absolute; border-radius: 50%; filter: blur(100px);
  animation: bFloat 10s ease-in-out infinite;
}
.blob:nth-child(1){ width:500px;height:500px;background:rgba(124,58,237,.1);top:-150px;right:-100px;animation-delay:0s }
.blob:nth-child(2){ width:400px;height:400px;background:rgba(236,72,153,.07);bottom:-100px;left:-80px;animation-delay:4s }
@keyframes bFloat{ 0%,100%{transform:translate(0,0)}50%{transform:translate(15px,-20px)} }

/* CARD */
.card {
  position: relative; z-index: 1;
  width: 100%; max-width: 380px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 40px 36px 32px;
  box-shadow: 0 8px 40px rgba(0,0,0,.08);
  animation: cardIn .5s cubic-bezier(.16,1,.3,1);
}
@keyframes cardIn { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }

/* SALON HEADER */
.salon-header {
  text-align: center;
  margin-bottom: 32px;
  padding-bottom: 28px;
  border-bottom: 1px solid var(--border);
}
.salon-avatar {
  width: 64px; height: 64px; border-radius: 18px;
  background: var(--grad);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 14px;
  box-shadow: 0 6px 20px rgba(124,58,237,.25);
  font-size: 28px;
  overflow: hidden;
}
.salon-avatar img {
  width: 100%; height: 100%; object-fit: cover; border-radius: 18px;
}
.salon-avatar-icon {
  display: flex; align-items: center; justify-content: center;
  width: 100%; height: 100%;
}
.salon-name {
  font-size: 20px; font-weight: 600;
  letter-spacing: -.5px; color: var(--ink);
  margin-bottom: 3px;
}
.salon-sub {
  font-size: 12px; color: var(--ink3);
}

/* LOADING STATE */
.skeleton {
  background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%);
  background-size: 200% 100%;
  animation: shimmer 1.5s infinite;
  border-radius: 6px;
}
@keyframes shimmer { to { background-position: -200% 0; } }
.sk-avatar { width:64px;height:64px;border-radius:18px;margin:0 auto 14px; }
.sk-name { width:140px;height:20px;margin:0 auto 6px; }
.sk-sub { width:80px;height:12px;margin:0 auto; }

/* FORM */
.form-title {
  font-size: 14px; font-weight: 600; color: var(--ink2);
  margin-bottom: 18px; letter-spacing: -.1px;
}

.field { margin-bottom: 12px; }
.field label {
  display: block; font-size: 11px; font-weight: 500;
  color: var(--ink3); margin-bottom: 5px; letter-spacing: .3px;
  text-transform: uppercase;
}
.field input {
  width: 100%; height: 42px; padding: 0 13px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 9px; color: var(--ink);
  font-family: inherit; font-size: 14px;
  outline: none; transition: border-color .15s, box-shadow .15s, background .15s;
}
.field input:focus {
  background: white; border-color: rgba(124,58,237,.4);
  box-shadow: 0 0 0 3px rgba(124,58,237,.08);
}
.field input::placeholder { color: var(--ink3); }

.pass-wrap { position: relative; }
.pass-wrap input { padding-right: 40px; }
.pass-eye {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  background: none; border: none; cursor: pointer;
  color: var(--ink3); transition: color .15s; padding: 2px;
}
.pass-eye:hover { color: var(--p); }

/* FORGOT */
.forgot {
  display: block; text-align: right; font-size: 12px;
  color: var(--ink3); text-decoration: none;
  margin-bottom: 16px; margin-top: -4px;
  transition: color .15s;
}
.forgot:hover { color: var(--p); }

/* BTN */
.btn-login {
  width: 100%; height: 43px; border: none; border-radius: 9px;
  background: var(--ink); color: white;
  font-family: inherit; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: opacity .15s, transform .15s;
  letter-spacing: -.1px; position: relative; overflow: hidden;
}
.btn-login::after {
  content: ''; position: absolute; inset: 0;
  background: var(--grad); opacity: 0; transition: opacity .25s;
}
.btn-login:hover::after { opacity: 1; }
.btn-login span { position: relative; z-index: 1; }
.btn-login:hover { transform: translateY(-1px); }
.btn-login:active { transform: scale(.99); }
.btn-login:disabled { opacity: .5; cursor: not-allowed; transform: none; }

/* SPINNER */
.spin {
  display: none; width: 16px; height: 16px;
  border: 1.5px solid rgba(255,255,255,.3); border-top-color: white;
  border-radius: 50%; animation: spinning .7s linear infinite;
  margin: 0 auto; position: relative; z-index: 1;
}
@keyframes spinning { to { transform: rotate(360deg); } }

/* MSG */
.msg {
  padding: 10px 12px; border-radius: 8px; font-size: 13px;
  margin-bottom: 12px; display: none; line-height: 1.5;
}
.msg.err { background:#fff1f2; border:1px solid #fecdd3; color:#9f1239; }

/* FOOTER */
.footer {
  text-align: center; margin-top: 24px;
  font-size: 11px; color: var(--ink3);
}
.footer a {
  color: var(--ink3); text-decoration: none;
  display: inline-flex; align-items: center; gap: 5px;
}
.footer a:hover { color: var(--p); }
.footer-logo {
  display: inline-flex; align-items: center; justify-content: center;
  width: 16px; height: 16px; border-radius: 4px;
  background: var(--grad); vertical-align: middle;
}

/* NOT FOUND */
.not-found {
  text-align: center; padding: 20px 0;
}
.not-found-icon { font-size: 40px; margin-bottom: 12px; }
.not-found-title { font-size: 16px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
.not-found-sub { font-size: 13px; color: var(--ink3); margin-bottom: 20px; line-height: 1.5; }
.btn-back {
  display: inline-block; padding: 9px 20px;
  background: var(--ink); color: white; border-radius: 8px;
  font-size: 13px; font-weight: 500; text-decoration: none;
  transition: opacity .15s;
}
.btn-back:hover { opacity: .8; }
</style>
</head>
<body>

<div class="aurora">
  <div class="blob"></div>
  <div class="blob"></div>
</div>

<div class="card">

  <!-- SALON HEADER (loading state) -->
  <div class="salon-header" id="salonHeader">
    <div class="skeleton sk-avatar"></div>
    <div class="skeleton sk-name"></div>
    <div class="skeleton sk-sub" style="margin-top:6px"></div>
  </div>

  <!-- FORM -->
  <div id="formWrap">
    <div class="form-title">Entre com sua conta</div>
    <div class="msg" id="msgErr"></div>

    <div class="field">
      <label>Login</label>
      <input type="text" id="inp-login" placeholder="Seu login ou email"
        autocomplete="username"
        onkeydown="if(event.key==='Enter')document.getElementById('inp-pass').focus()">
    </div>
    <div class="field">
      <label>Senha</label>
      <div class="pass-wrap">
        <input type="password" id="inp-pass" placeholder="Sua senha"
          autocomplete="current-password"
          onkeydown="if(event.key==='Enter')fazerLogin()">
        <button class="pass-eye" type="button" onclick="togglePass()">
          <svg width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
    </div>

    <a href="#" class="forgot">Esqueci minha senha</a>

    <button class="btn-login" id="btnLogin" onclick="fazerLogin()">
      <span id="btnTxt">Entrar →</span>
      <div class="spin" id="btnSpin"></div>
    </button>
  </div>

  <!-- NOT FOUND (hidden) -->
  <div id="notFound" style="display:none">
    <div class="not-found">
      <div class="not-found-icon">🔍</div>
      <div class="not-found-title">Link não encontrado</div>
      <div class="not-found-sub">Este link de acesso é inválido ou o salão foi desativado.</div>
      <a href="/" class="btn-back">Ir para o início</a>
    </div>
  </div>

  <div class="footer">
    <a href="/">
      <div class="footer-logo">
        <svg width="8" height="8" fill="none" viewBox="0 0 24 24">
          <circle cx="12" cy="7" r="3" stroke="white" stroke-width="2.5"/>
          <path d="M6 21c0-3.5 2.5-6 6-6s6 2.5 6 6" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
        </svg>
      </div>
      Musa — Gestão para Salões
    </a>
  </div>

</div>

<script>
var _salonId = null;

// Pegar salon_id da URL: /s/16
(function(){
  var parts = window.location.pathname.split('/');
  var idx = parts.indexOf('s');
  if(idx >= 0 && parts[idx+1]) {
    _salonId = parseInt(parts[idx+1]);
  }
  if(!_salonId) {
    // Fallback: ?salon_id=
    var p = new URLSearchParams(window.location.search);
    _salonId = parseInt(p.get('salon_id')) || null;
  }
})();

// Carregar info do salão
async function carregarSalao() {
  if(!_salonId) { mostrarNotFound(); return; }
  try {
    const r = await fetch('/api/salao-info/' + _salonId);
    if(!r.ok) { mostrarNotFound(); return; }
    const d = await r.json();
    if(d.erro) { mostrarNotFound(); return; }

    // Montar header
    var avatar = '';
    if(d.logo) {
      avatar = '<img src="' + d.logo + '" alt="' + d.nome + '">';
    } else {
      // Inicial do salão
      var inicial = d.nome.charAt(0).toUpperCase();
      avatar = '<div class="salon-avatar-icon" style="font-size:26px;font-weight:700;color:white;font-family:Inter,sans-serif">' + inicial + '</div>';
    }

    document.getElementById('salonHeader').innerHTML =
      '<div class="salon-avatar">' + avatar + '</div>' +
      '<div class="salon-name">' + d.nome + '</div>' +
      '<div class="salon-sub">Faça login para continuar</div>';

    document.title = d.nome + ' — Musa';

    // Focar no login
    setTimeout(function(){ document.getElementById('inp-login').focus(); }, 100);

  } catch(e) { mostrarNotFound(); }
}

function mostrarNotFound() {
  document.getElementById('salonHeader').style.display = 'none';
  document.getElementById('formWrap').style.display = 'none';
  document.getElementById('notFound').style.display = 'block';
}

function togglePass() {
  var inp = document.getElementById('inp-pass');
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function setLoad(on) {
  document.getElementById('btnLogin').disabled = on;
  document.getElementById('btnSpin').style.display = on ? 'block' : 'none';
  document.getElementById('btnTxt').style.display = on ? 'none' : 'inline';
}

function showErr(txt) {
  var el = document.getElementById('msgErr');
  el.textContent = txt; el.className = 'msg err'; el.style.display = 'block';
}

async function fazerLogin() {
  var login = document.getElementById('inp-login').value.trim();
  var senha = document.getElementById('inp-pass').value;
  if(!login || !senha) { showErr('Preencha login e senha'); return; }
  if(!_salonId) { showErr('Link inválido'); return; }

  setLoad(true);
  document.getElementById('msgErr').style.display = 'none';

  try {
    const r = await fetch('/api/login', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({login, senha, salon_id: _salonId})
    });
    const d = await r.json();
    if(!d.ok) {
      showErr(d.erro || 'Login ou senha incorretos');
      setLoad(false);
      return;
    }
    localStorage.setItem('musa_salon_id', String(_salonId));
    window.location.href = '/?salon_id=' + _salonId;
  } catch(e) {
    showErr('Erro de conexão. Tente novamente.');
    setLoad(false);
  }
}

carregarSalao();
</script>
</body>
</html>
